<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenCode</title>
<style>
  :root {
    --bg-base:      #0d0d0d;
    --bg-panel:     #141414;
    --bg-input:     #1a1a1a;
    --bg-msg-ai:    #181818;
    --bg-msg-user:  #1f2a1f;
    --border:       #2a2a2a;
    --border-sel:   #3a7a3a;
    --accent:       #4caf50;
    --accent-dim:   #2e6b31;
    --text-pri:     #e8e8e8;
    --text-sec:     #888;
    --text-muted:   #555;
    --tag-bg:       #1a2e1a;
    --tag-fg:       #6abf6a;
    --font-ui:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-body:    -apple-system, 'Segoe UI', sans-serif;
    --radius:       6px;
    --radius-lg:    10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-base);
    color: var(--text-pri);
    font-family: var(--font-body);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logo-icon {
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 11px;
    height: 11px;
    fill: #0d0d0d;
  }

  .logo-text {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-pri);
    letter-spacing: 0.04em;
  }

  .divider-v {
    width: 1px;
    height: 14px;
    background: var(--border);
  }

  .model-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 8px;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 11px;
    color: var(--text-sec);
    transition: border-color 0.15s, color 0.15s;
    position: relative;
  }

  .model-btn:hover {
    border-color: var(--border-sel);
    color: var(--text-pri);
  }

  .model-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .model-name {
    max-width: 130px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chevron {
    width: 8px;
    height: 8px;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .icon-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }

  .icon-btn:hover {
    background: var(--bg-input);
    color: var(--text-pri);
  }

  .icon-btn svg {
    width: 15px;
    height: 15px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── DROPDOWN DEL MODELO ── */
  .dropdown-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 90;
  }

  .dropdown-overlay.open {
    display: block;
  }

  .dropdown {
    display: none;
    position: fixed;
    top: 40px;
    right: 12px;
    width: 220px;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: var(--radius-lg);
    z-index: 100;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .dropdown.open {
    display: block;
  }

  .dropdown-section {
    padding: 6px 0;
  }

  .dropdown-section + .dropdown-section {
    border-top: 1px solid var(--border);
  }

  .dropdown-label {
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-muted);
    padding: 6px 12px 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--text-sec);
    transition: background 0.1s, color 0.1s;
  }

  .dropdown-item:hover {
    background: #252525;
    color: var(--text-pri);
  }

  .dropdown-item.active {
    color: var(--accent);
  }

  .dropdown-check {
    width: 12px;
    flex-shrink: 0;
    text-align: center;
    color: var(--accent);
    font-size: 11px;
  }

  /* ── TABS DE CONTEXTO ── */
  .context-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .context-bar::-webkit-scrollbar { display: none; }

  .ctx-tag {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--tag-bg);
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    padding: 3px 8px;
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--tag-fg);
    white-space: nowrap;
    cursor: default;
  }

  .ctx-tag svg {
    width: 10px;
    height: 10px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
  }

  .ctx-tag-close {
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
  }

  .ctx-tag-close:hover { opacity: 1; }

  .ctx-add {
    display: flex;
    align-items: center;
    gap: 4px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
  }

  .ctx-add:hover {
    border-color: var(--accent-dim);
    color: var(--tag-fg);
  }

  /* ── AREA DE MENSAJES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* mensaje de bienvenida */
  .welcome {
    text-align: center;
    padding: 32px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .welcome-icon {
    width: 36px;
    height: 36px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .welcome-icon svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .welcome h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-pri);
  }

  .welcome p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 240px;
  }

  .quick-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    margin-top: 8px;
  }

  .qa-btn {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    text-align: left;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--text-sec);
    transition: border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qa-btn:hover {
    border-color: var(--border-sel);
    color: var(--text-pri);
  }

  .qa-btn svg {
    width: 13px;
    height: 13px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
    flex-shrink: 0;
    opacity: 0.6;
  }

  /* burbujas */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 4px 0;
  }

  .msg-header {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .msg-avatar {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-ui);
    font-size: 9px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .msg-avatar.ai {
    background: var(--accent);
    color: #0d0d0d;
  }

  .msg-avatar.user {
    background: #2a3f2a;
    color: var(--tag-fg);
  }

  .msg-role {
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .msg-time {
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .msg-body {
    margin-left: 26px;
    background: var(--bg-msg-ai);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-pri);
  }

  .msg.user .msg-body {
    background: var(--bg-msg-user);
    border-color: var(--accent-dim);
  }

  .msg-body code {
    font-family: var(--font-ui);
    font-size: 11px;
    background: rgba(76, 175, 80, 0.08);
    border: 1px solid rgba(76, 175, 80, 0.15);
    border-radius: 3px;
    padding: 1px 5px;
    color: var(--tag-fg);
  }

  .msg-body pre {
    background: #111;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin: 8px 0 0;
    overflow-x: auto;
    scrollbar-width: thin;
  }

  .msg-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 11px;
    color: #c8e6c9;
    line-height: 1.55;
  }

  .msg-actions {
    margin-left: 26px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .msg:hover .msg-actions { opacity: 1; }

  .msg-act-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 10px;
    font-family: var(--font-ui);
    padding: 2px 6px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.1s, color 0.1s;
  }

  .msg-act-btn:hover {
    background: var(--bg-input);
    color: var(--text-pri);
  }

  .msg-act-btn svg {
    width: 11px;
    height: 11px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  /* indicador de escritura */
  .typing {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .typing.visible { display: flex; }

  .typing-avatar {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-ui);
    font-size: 9px;
    font-weight: 700;
    color: #0d0d0d;
    flex-shrink: 0;
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .typing-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent-dim);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ── BARRA DE ENTRADA ── */
  .input-area {
    flex-shrink: 0;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 8px 10px;
    transition: border-color 0.15s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent-dim);
  }

  #chatInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-pri);
    font-family: var(--font-body);
    font-size: 13px;
    resize: none;
    line-height: 1.5;
    max-height: 120px;
    min-height: 18px;
    scrollbar-width: thin;
  }

  #chatInput::placeholder { color: var(--text-muted); }

  .input-send {
    width: 28px;
    height: 28px;
    border-radius: var(--radius);
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }

  .input-send:hover { background: #5cbf60; }
  .input-send:disabled { opacity: 0.3; cursor: not-allowed; }

  .input-send svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: #0d0d0d;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .input-toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .tool-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    border-radius: 4px;
    padding: 4px 6px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 11px;
    font-family: var(--font-ui);
    transition: background 0.1s, color 0.1s;
  }

  .tool-btn:hover {
    background: var(--bg-input);
    color: var(--text-sec);
  }

  .tool-btn svg {
    width: 13px;
    height: 13px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .tool-btn-sep {
    width: 1px;
    height: 14px;
    background: var(--border);
    margin: 0 4px;
  }

  .mode-pill {
    margin-left: auto;
    font-family: var(--font-ui);
    font-size: 10px;
    background: var(--tag-bg);
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    padding: 3px 7px;
    color: var(--tag-fg);
    cursor: pointer;
    transition: background 0.15s;
  }

  .mode-pill:hover { background: #213b21; }

  .shortcut-hint {
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--text-muted);
    margin-left: 4px;
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 12 12"><path d="M2 10 L6 2 L10 10 M3.5 7 L8.5 7"/></svg>
      </div>
      <span class="logo-text">opencode</span>
    </div>
    <div class="divider-v"></div>
    <button class="model-btn" id="modelBtn" title="Seleccionar modelo">
      <span class="model-dot"></span>
      <span class="model-name" id="modelName">claude-sonnet-4</span>
      <svg class="chevron" viewBox="0 0 8 8" fill="currentColor"><path d="M1 2.5L4 5.5L7 2.5"/></svg>
    </button>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" title="Nueva sesion">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="icon-btn" title="Historial">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    </button>
    <button class="icon-btn" title="Configuracion">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
    </button>
  </div>
</div>

<!-- DROPDOWN MODELO -->
<div class="dropdown-overlay" id="dropOverlay"></div>
<div class="dropdown" id="modelDropdown">
  <div class="dropdown-section">
    <div class="dropdown-label">Modelo</div>
    <div class="dropdown-item active" data-model="claude-sonnet-4">
      <span class="dropdown-check">✓</span>claude-sonnet-4
    </div>
    <div class="dropdown-item" data-model="claude-opus-4">
      <span class="dropdown-check"></span>claude-opus-4
    </div>
    <div class="dropdown-item" data-model="claude-haiku-4">
      <span class="dropdown-check"></span>claude-haiku-4
    </div>
  </div>
  <div class="dropdown-section">
    <div class="dropdown-label">Modo</div>
    <div class="dropdown-item" data-mode="auto">
      <span class="dropdown-check">✓</span>auto
    </div>
    <div class="dropdown-item" data-mode="agent">
      <span class="dropdown-check"></span>agent
    </div>
    <div class="dropdown-item" data-mode="chat">
      <span class="dropdown-check"></span>chat
    </div>
  </div>
</div>

<!-- BARRA DE CONTEXTO -->
<div class="context-bar" id="contextBar">
  <div class="ctx-tag">
    <svg viewBox="0 0 16 16"><path d="M4 4h8M4 8h6M4 11h4" stroke-linecap="round"/></svg>
    main.ts
    <span class="ctx-tag-close" onclick="this.closest('.ctx-tag').remove()">
      <svg viewBox="0 0 10 10" width="8" height="8" fill="none" stroke="currentColor" stroke-width="2"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7"/></svg>
    </span>
  </div>
  <div class="ctx-tag">
    <svg viewBox="0 0 16 16"><path d="M4 4h8M4 8h6M4 11h4" stroke-linecap="round"/></svg>
    routes/api.ts
    <span class="ctx-tag-close" onclick="this.closest('.ctx-tag').remove()">
      <svg viewBox="0 0 10 10" width="8" height="8" fill="none" stroke="currentColor" stroke-width="2"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7"/></svg>
    </span>
  </div>
  <button class="ctx-add" onclick="addCtxTag()">+ Añadir contexto</button>
</div>

<!-- MENSAJES -->
<div class="messages" id="messages">

  <div class="welcome" id="welcome">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L15.5 9H22L16.5 13.5L18.5 21L12 17L5.5 21L7.5 13.5L2 9H8.5L12 2Z"/></svg>
    </div>
    <h2>OpenCode listo</h2>
    <p>Haz una pregunta, genera codigo o abre un archivo como contexto.</p>
    <div class="quick-actions">
      <button class="qa-btn" onclick="sendQuick('Explica el archivo seleccionado')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        Explicar archivo actual
      </button>
      <button class="qa-btn" onclick="sendQuick('Encuentra posibles bugs en el codigo actual')">
        <svg viewBox="0 0 24 24"><path d="M9 9l-3-3M15 9l3-3M9 15l-3 3M15 15l3 3M12 21a9 9 0 100-18 9 9 0 000 18z"/></svg>
        Buscar bugs
      </button>
      <button class="qa-btn" onclick="sendQuick('Genera tests unitarios para las funciones del archivo')">
        <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M7 2h10l2 2v16l-2 2H7l-2-2V4l2-2z"/></svg>
        Generar tests
      </button>
      <button class="qa-btn" onclick="sendQuick('Refactoriza el codigo para mejorar la legibilidad')">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        Refactorizar
      </button>
    </div>
  </div>

  <div class="typing" id="typing">
    <div class="typing-avatar">OC</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="chatInput"
      rows="1"
      placeholder="Escribe tu tarea aqui... (@archivo, /comando)"
    ></textarea>
    <button class="input-send" id="sendBtn" title="Enviar (Enter)">
      <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
  </div>
  <div class="input-toolbar">
    <button class="tool-btn" title="Adjuntar archivo">
      <svg viewBox="0 0 24 24"><path d="M21.44 11.05L12.25 20.24a6 6 0 01-8.49-8.49l9.2-9.19a4 4 0 015.66 5.65L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <button class="tool-btn" title="Insertar codigo">
      <svg viewBox="0 0 24 24"><path d="M9 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 3a2 2 0 002 2h2a2 2 0 002-2M9 3a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    </button>
    <button class="tool-btn" title="Archivo activo como contexto">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
    </button>
    <div class="tool-btn-sep"></div>
    <button class="tool-btn" title="Seleccion del editor">
      <svg viewBox="0 0 24 24"><path d="M3 9l4-4 4 4M7 5v14M21 15l-4 4-4-4M17 19V5"/></svg>
    </button>
    <button class="tool-btn" title="Git diff actual">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M6 9v4a2 2 0 002 2h4M18 15v-4a2 2 0 00-2-2h-4"/></svg>
    </button>
    <div class="tool-btn-sep"></div>
    <span class="mode-pill" id="modePill">auto</span>
    <span class="shortcut-hint">Enter ↵</span>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('chatInput');
  const sendBtn    = document.getElementById('sendBtn');
  const typingEl   = document.getElementById('typing');
  const welcomeEl  = document.getElementById('welcome');
  const modelBtn   = document.getElementById('modelBtn');
  const modelNameEl = document.getElementById('modelName');
  const dropdown   = document.getElementById('modelDropdown');
  const dropOverlay = document.getElementById('dropOverlay');

  let selectedModel = 'claude-sonnet-4';
  let selectedMode  = 'auto';
  let sessionMsgs   = [];

  /* auto-resize textarea */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  /* envio con Enter (Shift+Enter = salto) */
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    appendMsg('user', text);
    showTyping();
    setTimeout(() => {
      hideTyping();
      appendMsg('ai', getMockReply(text));
    }, 1400);
  }

  function sendQuick(text) {
    inputEl.value = text;
    sendMessage();
  }

  function appendMsg(role, text) {
    if (welcomeEl) welcomeEl.style.display = 'none';

    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    const msgEl = document.createElement('div');
    msgEl.className = 'msg ' + role;

    const isCode = text.includes('```') || text.includes('function') || text.includes('const ');
    const bodyHtml = renderBody(text);

    msgEl.innerHTML = `
      <div class="msg-header">
        <div class="msg-avatar ${role}">${role === 'ai' ? 'OC' : 'Tu'}</div>
        <span class="msg-role">${role === 'ai' ? 'opencode' : 'tu'}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-body">${bodyHtml}</div>
      <div class="msg-actions">
        <button class="msg-act-btn" onclick="copyMsg(this)">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          copiar
        </button>
        ${role === 'ai' ? `<button class="msg-act-btn"><svg viewBox="0 0 24 24"><path d="M23 7L16 12L23 17V7zM1 5h12a2 2 0 012 2v10a2 2 0 01-2 2H1a2 2 0 01-2-2V7a2 2 0 012-2z"/></svg>insertar en editor</button>` : ''}
      </div>
    `;

    typingEl.before(msgEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderBody(text) {
    return text
      .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${escHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTyping() {
    typingEl.classList.add('visible');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    typingEl.classList.remove('visible');
  }

  function copyMsg(btn) {
    const body = btn.closest('.msg').querySelector('.msg-body');
    navigator.clipboard.writeText(body.innerText);
    btn.textContent = 'copiado ✓';
    setTimeout(() => {
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> copiar`;
    }, 1500);
  }

  function getMockReply(text) {
    const t = text.toLowerCase();
    if (t.includes('bug') || t.includes('error'))
      return 'He analizado el archivo. Encontre un posible problema en la linea 42:\n\n```ts\n// problema: llamada asincrona sin await\nconst data = fetchUser(id);\n```\n\nPrueba a añadir `await` delante de la llamada.';
    if (t.includes('test'))
      return 'Aqui tienes los tests basicos:\n\n```ts\ndescribe("fetchUser", () => {\n  it("deberia retornar usuario", async () => {\n    const user = await fetchUser("123");\n    expect(user.id).toBe("123");\n  });\n});\n```';
    if (t.includes('refactor'))
      return 'Sugerencia de refactor: extrae la logica de validacion a una funcion separada `validateInput()` para reducir la complejidad ciclomatica del metodo principal.';
    return 'Entendido. Analizando el contexto del proyecto... ¿Hay alguna parte especifica en la que quieras que me centre primero?';
  }

  /* dropdown modelo */
  modelBtn.addEventListener('click', e => {
    e.stopPropagation();
    dropdown.classList.toggle('open');
    dropOverlay.classList.toggle('open');
  });

  dropOverlay.addEventListener('click', () => {
    dropdown.classList.remove('open');
    dropOverlay.classList.remove('open');
  });

  dropdown.querySelectorAll('[data-model]').forEach(item => {
    item.addEventListener('click', () => {
      selectedModel = item.dataset.model;
      modelNameEl.textContent = selectedModel;
      dropdown.querySelectorAll('[data-model]').forEach(i => i.querySelector('.dropdown-check').textContent = '');
      item.querySelector('.dropdown-check').textContent = '✓';
      dropdown.classList.remove('open');
      dropOverlay.classList.remove('open');
    });
  });

  const modePill = document.getElementById('modePill');
  dropdown.querySelectorAll('[data-mode]').forEach(item => {
    item.addEventListener('click', () => {
      selectedMode = item.dataset.mode;
      modePill.textContent = selectedMode;
      dropdown.querySelectorAll('[data-mode]').forEach(i => i.querySelector('.dropdown-check').textContent = '');
      item.querySelector('.dropdown-check').textContent = '✓';
    });
  });

  function addCtxTag() {
    const name = prompt('Nombre del archivo o ruta:');
    if (!name) return;
    const bar = document.getElementById('contextBar');
    const addBtn = bar.querySelector('.ctx-add');
    const tag = document.createElement('div');
    tag.className = 'ctx-tag';
    tag.innerHTML = `
      <svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h8M4 8h6M4 11h4" stroke-linecap="round"/></svg>
      ${name}
      <span class="ctx-tag-close" onclick="this.closest('.ctx-tag').remove()">
        <svg viewBox="0 0 10 10" width="8" height="8" fill="none" stroke="currentColor" stroke-width="2"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7"/></svg>
      </span>
    `;
    bar.insertBefore(tag, addBtn);
  }
</script>
</body>
</html>
